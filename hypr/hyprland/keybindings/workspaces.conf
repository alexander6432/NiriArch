##################
### WORKSPACES ###
##################

# Switch workspaces with mainMod + [0-9]
bindd = $mainMod, 1, Ir al Espacio de Trabajo 1,  workspace, 1
bindd = $mainMod, 2, Ir al Espacio de Trabajo 2,  workspace, 2
bindd = $mainMod, 3, Ir al Espacio de Trabajo 3,  workspace, 3
bindd = $mainMod, 4, Ir al Espacio de Trabajo 4,  workspace, 4
bindd = $mainMod, 5, Ir al Espacio de Trabajo 5,  workspace, 5
bindd = $mainMod, 6, Ir al Espacio de Trabajo 6,  workspace, 6
bindd = $mainMod, 7, Ir al Espacio de Trabajo 7,  workspace, 7
bindd = $mainMod, 8, Ir al Espacio de Trabajo 8,  workspace, 8
bindd = $mainMod, 9, Ir al Espacio de Trabajo 9,  workspace, 9
bindd = $mainMod, 0, Ir al Espacio de Trabajo 10, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bindd = $mainMod SHIFT, 1, Mover Ventana al Espacio de Trabajo 1,  movetoworkspace, 1
bindd = $mainMod SHIFT, 2, Mover Ventana al Espacio de Trabajo 2,  movetoworkspace, 2
bindd = $mainMod SHIFT, 3, Mover Ventana al Espacio de Trabajo 3,  movetoworkspace, 3
bindd = $mainMod SHIFT, 4, Mover Ventana al Espacio de Trabajo 4,  movetoworkspace, 4
bindd = $mainMod SHIFT, 5, Mover Ventana al Espacio de Trabajo 5,  movetoworkspace, 5
bindd = $mainMod SHIFT, 6, Mover Ventana al Espacio de Trabajo 6,  movetoworkspace, 6
bindd = $mainMod SHIFT, 7, Mover Ventana al Espacio de Trabajo 7,  movetoworkspace, 7
bindd = $mainMod SHIFT, 8, Mover Ventana al Espacio de Trabajo 8,  movetoworkspace, 8
bindd = $mainMod SHIFT, 9, Mover Ventana al Espacio de Trabajo 9,  movetoworkspace, 9
bindd = $mainMod SHIFT, 0, Mover Ventana al Espacio de Trabajo 10, movetoworkspace, 10

# Move active window to a workspace in silent with mainMod + CTRL + [0-9]
bindd = $mainMod CTRL, 1, Mover Ventana al Espacio de Trabajo 1 y Silenciosamente,  movetoworkspacesilent, 1
bindd = $mainMod CTRL, 2, Mover Ventana al Espacio de Trabajo 2 y Silenciosamente,  movetoworkspacesilent, 2
bindd = $mainMod CTRL, 3, Mover Ventana al Espacio de Trabajo 3 y Silenciosamente,  movetoworkspacesilent, 3
bindd = $mainMod CTRL, 4, Mover Ventana al Espacio de Trabajo 4 y Silenciosamente,  movetoworkspacesilent, 4
bindd = $mainMod CTRL, 5, Mover Ventana al Espacio de Trabajo 5 y Silenciosamente,  movetoworkspacesilent, 5
bindd = $mainMod CTRL, 6, Mover Ventana al Espacio de Trabajo 6 y Silenciosamente,  movetoworkspacesilent, 6
bindd = $mainMod CTRL, 7, Mover Ventana al Espacio de Trabajo 7 y Silenciosamente,  movetoworkspacesilent, 7
bindd = $mainMod CTRL, 8, Mover Ventana al Espacio de Trabajo 8 y Silenciosamente,  movetoworkspacesilent, 8
bindd = $mainMod CTRL, 9, Mover Ventana al Espacio de Trabajo 9 y Silenciosamente,  movetoworkspacesilent, 9
bindd = $mainMod CTRL, 0, Mover Ventana al Espacio de Trabajo 10 y Silenciosamente, movetoworkspacesilent, 10

# Example special workspace (scratchpad)
bindd = $mainMod,       Apostrophe, Ir al Espacio de Trabajo Especial(magic),            togglespecialworkspace, magic
bindd = $mainMod CTRL,  Apostrophe, Mover Ventana al Espacio de Trabajo Especial(magic), movetoworkspace, special:magic
bindd = $mainMod SHIFT, Apostrophe, Mover Ventana al Espacio de Trabajo Especial(magic), movetoworkspacesilent, special:magic

# Navegación Relativa a los Espacios de Trabajo
bindd = $mainMod, S, Ir al Siguente Espacio de Trabajo Activo(Relativo al Actual), workspace, e+1
bindd = $mainMod, A, Ir al Anterior Espacio de Trabajo Activo(Relativo al Actual), workspace, e-1

bindd = $mainMod SHIFT, S, Mover Ventana al Siguente Espacio de Trabajo(Relativo al Actual), movetoworkspace, +1
bindd = $mainMod SHIFT, A, Mover Ventana al Anterior Espacio de Trabajo(Relativo al Actual), movetoworkspace, -1

bindd = $mainMod CTRL, S, Mover Ventana al Siguente Espacio de Trabajo Silenciosamente (Relativo al Actual), movetoworkspacesilent, +1
bindd = $mainMod CTRL, A, Mover Ventana al Anterior Espacio de Trabajo Silenciosamente (Relativo al Actual), movetoworkspacesilent, -1
