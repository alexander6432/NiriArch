###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

###############
### SOURCES ###
###############

source = ~/.config/hypr/hyprland/keybindings/hardware.conf
source = ~/.config/hypr/hyprland/keybindings/windows.conf
source = ~/.config/hypr/hyprland/keybindings/workspaces.conf
# source = ~/.config/hypr/hyprland/keybindings/layout_dwindle.conf
# source = ~/.config/hypr/hyprland/keybindings/layout_master.conf
# source = ~/.config/hypr/hyprland/keybindings/layout_monocle.conf
source = ~/.config/hypr/hyprland/keybindings/layout_scrolling.conf

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bindd = $mainMod,       Q, Cerrar Ventana,                               killactive,
bindd = $mainMod SHIFT, Q, Matar Todas las Instancias de una Aplicación, forcekillactive,
bindd = $mainMod SHIFT, M, Maximizar Ventana,                            fullscreen, 1
bindd = $mainMod,       M, Pantalla Completa,                            fullscreen, 0

bindd = $mainMod,       F, Alternar a Flotante,        togglefloating,
bindd = $mainMod SHIFT, F, Fijar Ventana Flotante,     pin,
bindd = $mainMod CTRL,  F, Enfocar Ventanas Flotantes, cyclenext, floating
bindd = $mainMod,       C, Centrar Ventana Flotante,   centerwindow,

bindd = $mainMod,       Return, Terminal,      exec, $terminal
bindd = $mainMod,       Z,      Google Chrome, exec, $chrome
bindd = $mainMod SHIFT, Z,      Firefox,       exec, $firefox

bindd = $mainMod,       Home,   Centro de Control,                exec, $centro_control
bindd = $mainMod,       F4,     Alternar Inhibidor,               exec, $idle_inhibidor
bindd = $mainMod,       E,      Cambiar de Fondo de Pantalla,     exec, $wallpaper_random
bindd = $mainMod SHIFT, E,      Selector de Fondos de Pantalla,   exec, $wallpaper_selector
bindd = $mainMod,       N,      Centro de Notificaciones,         exec, $centro_notificaciones
bindd = $mainMod SHIFT, N,      Borrar Notificaciones Pendientes, exec, $borrar_notificaciones
bindd = $mainMod,       X,      Alterar Barra de Estado,          exec, $toggle_bar
bindd = $mainMod,       B,      Bloquear Pantalla,                exec, $bloquear_pantalla
bindd = $mainMod SHIFT, Escape, Menú de Sesión,                   exec, $power_menu
bindd = $mainMod CTRL,  Escape, Salir de Hyprland,                exec, $salir
bindd = $mainMod,       Space,  Menú de Aplicaciones,             exec, $menu
